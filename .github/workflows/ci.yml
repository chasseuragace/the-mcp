name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
        continue-on-error: true

      - name: Analyze
        run: dart analyze --fatal-infos --fatal-warnings

      - name: Run tests
        run: dart test test/platform_paths_test.dart test/consciousness_test.dart test/main_http_server_test.dart test/test_evolution_persistence.dart
